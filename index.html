<!doctype html>
<html lang="en" data-theme="warm" data-serif="on">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Calmly — Study Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=Hanken+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Apply the saved theme before React mounts to avoid a flash of the default theme. -->
    <script>
      try {
        var p = JSON.parse(localStorage.getItem("calmly.theme") || "{}");
        if (p.theme) document.documentElement.setAttribute("data-theme", p.theme);
        if (p.serif === false) document.documentElement.setAttribute("data-serif", "off");
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
